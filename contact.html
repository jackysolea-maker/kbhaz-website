<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | KBHAZ</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,aspect-ratio,line-clamp"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
    <style>
        :root { --bg-primary: #F5F2ED; --text-main: #1C1917; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-primary); color: var(--text-main); margin: 0; }
        .font-serif-luxury { font-family: 'Playfair Display', serif; }
        [lang-content] { display: none; }
        .lang-active { display: block; }
        span.lang-active { display: inline; }
    </style>
</head>
<body class="antialiased">

    <!-- Header -->
    <header class="bg-[#F5F2ED]/90 backdrop-blur-md border-b border-black/5">
        <div class="max-w-[1440px] mx-auto px-6 md:px-10 py-6 flex items-center justify-between">
            <div class="absolute left-1/2 transform -translate-x-1/2 text-center">
                <a href="index.html" class="text-3xl md:text-4xl font-serif-luxury tracking-[0.15em] font-medium block">KBHAZ</a>
            </div>
            <div class="flex items-center space-x-6 text-[11px] tracking-widest uppercase font-medium">
                <a href="index.html" class="hover:opacity-50">Back to Home</a>
            </div>
        </div>
    </header>

    <main class="max-w-xl mx-auto px-6 py-24">
        <h1 class="text-4xl font-serif-luxury italic mb-10 text-center">
            <span lang-content="en" class="lang-active">Contact Our Team</span>
            <span lang-content="zh">联系我们</span>
        </h1>
        <form class="space-y-8" onsubmit="event.preventDefault(); alert('Message Sent. Thank you.');">
            <div>
                <label class="block text-[10px] tracking-widest uppercase font-bold mb-2">Name</label>
                <input type="text" class="w-full bg-transparent border-b border-black/20 focus:border-black focus:ring-0 transition-colors py-2" required>
            </div>
            <div>
                <label class="block text-[10px] tracking-widest uppercase font-bold mb-2">Email</label>
                <input type="email" class="w-full bg-transparent border-b border-black/20 focus:border-black focus:ring-0 transition-colors py-2" required>
            </div>
            <div>
                <label class="block text-[10px] tracking-widest uppercase font-bold mb-2">Message</label>
                <textarea rows="4" class="w-full bg-transparent border-b border-black/20 focus:border-black focus:ring-0 transition-colors py-2" required></textarea>
            </div>
            <button type="submit" class="w-full bg-black text-white py-4 text-[11px] tracking-widest uppercase font-bold hover:bg-black/80 transition-all">
                Send Message
            </button>
        </form>
    </main>

</body>
</html>
